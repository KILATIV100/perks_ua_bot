version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-perkup}
      POSTGRES_USER: ${POSTGRES_USER:-perkup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perkup_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-perkup} -d ${POSTGRES_DB:-perkup}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-perkup}:${POSTGRES_PASSWORD:-perkup_password}@postgres:5432/${POSTGRES_DB:-perkup}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
    ports:
      - '${SERVER_PORT:-3000}:3000'

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      BOT_TOKEN: ${BOT_TOKEN}
      OWNER_ID: ${OWNER_ID:-7363233852}
      WEBHOOK_DOMAIN: ${WEBHOOK_DOMAIN:-}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-}
      API_URL: ${API_URL:-http://server:3000}
      REDIS_URL: redis://redis:6379
    ports:
      - '${BOT_PORT:-3001}:3001'

volumes:
  postgres_data:
  redis_data:
